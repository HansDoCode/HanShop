<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Hans Shop</title>
  <link rel="stylesheet" href="../output.css">
</head>
<body class="bg-gray-950 text-gray-100">
  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-700">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-gold">🏪 Hans Shop Admin</h1>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-400">Welcome, <span id="admin-username">Admin</span></span>
        <button id="logout-btn" class="px-3 py-1 text-sm border border-gray-600 rounded hover:border-gold">Logout</button>
      </div>
    </div>
  </header>

  <!-- Sidebar & Main -->
  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 border-r border-gray-700 min-h-screen p-4 hidden md:block">
      <nav class="space-y-2">
        <a href="/admin/dashboard.html" class="block px-4 py-2 bg-gold text-black rounded font-semibold">📊 Dashboard</a>
        <a href="/admin/orders.html" class="block px-4 py-2 text-gray-300 hover:bg-gray-800 rounded">📋 Orders</a>
        <a href="/admin/products.html" class="block px-4 py-2 text-gray-300 hover:bg-gray-800 rounded">📦 Products</a>
        <a href="/admin/announcements.html" class="block px-4 py-2 text-gray-300 hover:bg-gray-800 rounded">📢 Announcements</a>
        <a href="/admin/settings.html" class="block px-4 py-2 text-gray-300 hover:bg-gray-800 rounded">⚙️ Settings</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-8">
      <!-- Summary Cards -->
      <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
          <p class="text-gray-400 text-sm">Total Revenue (All Time)</p>
          <p class="text-3xl font-bold text-gold mt-2" id="total-revenue">₱0</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
          <p class="text-gray-400 text-sm">Revenue Today</p>
          <p class="text-3xl font-bold text-cyan mt-2" id="revenue-today">₱0</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
          <p class="text-gray-400 text-sm">Pending Orders</p>
          <p class="text-3xl font-bold text-yellow-500 mt-2" id="pending-orders">0</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
          <p class="text-gray-400 text-sm">Avg Order Value</p>
          <p class="text-3xl font-bold text-blue-400 mt-2" id="avg-order-value">₱0</p>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="grid md:grid-cols-2 gap-4 mb-8">
        <button onclick="window.location.href='/admin/orders.html'" class="bg-gradient-to-r from-blue-900 to-blue-800 p-4 rounded-lg hover:shadow-lg hover:shadow-blue-500/50 transition">
          <p class="text-lg font-bold mb-1">📋 View Orders</p>
          <p class="text-sm text-gray-300">Manage and fulfill orders</p>
        </button>
        <button onclick="window.location.href='/admin/products.html'" class="bg-gradient-to-r from-purple-900 to-purple-800 p-4 rounded-lg hover:shadow-lg hover:shadow-purple-500/50 transition">
          <p class="text-lg font-bold mb-1">📦 Manage Products</p>
          <p class="text-sm text-gray-300">Add, edit, or remove products</p>
        </button>
      </div>

      <!-- Recent Orders Table -->
      <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
        <h2 class="text-xl font-bold mb-4">Recent Orders</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="border-b border-gray-600">
              <tr>
                <th class="text-left py-2 px-2">Order ID</th>
                <th class="text-left py-2 px-2">Customer</th>
                <th class="text-left py-2 px-2">Total</th>
                <th class="text-left py-2 px-2">Status</th>
                <th class="text-left py-2 px-2">Date</th>
              </tr>
            </thead>
            <tbody id="recent-orders-tbody" class="divide-y divide-gray-700">
              <tr>
                <td colspan="5" class="text-center text-gray-500 py-4">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <a href="/admin/orders.html" class="text-gold text-sm hover:underline mt-4 inline-block">View all orders →</a>
      </div>

      <!-- Best Selling Products -->
      <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 mt-8">
        <h2 class="text-xl font-bold mb-4">Best Selling Products</h2>
        <div id="best-products" class="space-y-3">
          <div class="text-center text-gray-500 py-4">Loading...</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import "../js/analytics.js";
    import { requireAdmin, getAdminUsername } from "../js/admin.js";
    import { supabase } from "../js/supabase.js";
    import { logout, toast, formatCurrency } from "../js/utils.js";

    requireAdmin();
    document.getElementById("admin-username").textContent = getAdminUsername();

    document.getElementById("logout-btn").addEventListener("click", logout);

    async function loadDashboardData() {
      try {
        // Fetch orders
        const { data: orders, error: ordersError } = await supabase
          .from("orders")
          .select("*")
          .order("created_at", { ascending: false });

        if (ordersError) throw ordersError;

        // Calculate totals
        const totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
        const today = new Date().toISOString().split("T")[0];
        const todayOrders = orders.filter(o => o.created_at.startsWith(today));
        const todayRevenue = todayOrders.reduce((sum, o) => sum + (o.total || 0), 0);
        const pendingCount = orders.filter(o => o.status === "pending").length;
        const avgOrderValue = orders.length > 0 ? totalRevenue / orders.length : 0;

        document.getElementById("total-revenue").textContent = formatCurrency(totalRevenue);
        document.getElementById("revenue-today").textContent = formatCurrency(todayRevenue);
        document.getElementById("pending-orders").textContent = pendingCount;
        document.getElementById("avg-order-value").textContent = formatCurrency(avgOrderValue);

        // Recent orders
        const recentTableBody = document.getElementById("recent-orders-tbody");
        recentTableBody.innerHTML = orders.slice(0, 5).map(o => `
          <tr class="hover:bg-gray-700 cursor-pointer" onclick="window.location.href='/admin/orders.html'">
            <td class="py-2 px-2 font-mono text-gold">${o.id}</td>
            <td class="py-2 px-2">${o.customer_name}</td>
            <td class="py-2 px-2 font-bold">${formatCurrency(o.total)}</td>
            <td class="py-2 px-2">
              <span class="text-xs px-2 py-1 rounded ${
                o.status === "fulfilled" ? "bg-green-900 text-green-300" :
                o.status === "pending" ? "bg-yellow-900 text-yellow-300" :
                o.status === "rejected" ? "bg-red-900 text-red-300" :
                "bg-blue-900 text-blue-300"
              }">
                ${o.status}
              </span>
            </td>
            <td class="py-2 px-2 text-gray-400">${new Date(o.created_at).toLocaleDateString()}</td>
          </tr>
        `).join("");

        // Best selling products
        const { data: products, error: productsError } = await supabase
          .from("products")
          .select("id, name")
          .order("stock", { ascending: true })
          .limit(5);

        if (productsError) throw productsError;

        const bestProductsDiv = document.getElementById("best-products");
        bestProductsDiv.innerHTML = products.map((p, idx) => `
          <div class="flex items-center gap-3 pb-3 border-b border-gray-700">
            <span class="text-2xl font-bold text-gold">#${idx + 1}</span>
            <span class="flex-1">${p.name}</span>
          </div>
        `).join("");

      } catch (err) {
        console.error("Dashboard error:", err);
        toast("Failed to load dashboard", "error");
      }
    }

    loadDashboardData();
    setInterval(loadDashboardData, 5 * 60 * 1000); // Auto-refresh every 5 minutes
  </script>
</body>
</html>
